<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Mini-Discord</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1f22; 
            color: #dbdee1;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        
        /* Écran d'accueil */
        .auth-container {
            background: #313338; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .auth-container h2 { text-align: center; color: #fff; margin-bottom: 8px; }
        .auth-container p { text-align: center; color: #b5bac1; font-size: 0.9rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #b5bac1; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 10px; background: #1e1f22; border: none; color: #fff; border-radius: 3px; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: #5865f2; color: white; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .auth-btn:hover { background: #4752c4; }
        .switch-auth { text-align: center; font-size: 0.85rem; color: #949ba4; }
        .switch-auth a { color: #00a8fc; text-decoration: none; cursor: pointer; }
        
        /* L'Application Globale (Layout en colonnes) */
        #main-app { display: none; width: 100%; max-width: 1000px; height: 85vh; background: #2b2d31; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .app-layout { display: flex; height: 100%; }
        
        /* Zone de Chat */
        #chat-window { flex-grow: 1; display: flex; flex-direction: column; height: 100%; border-right: 1px solid #1f2023; }
        #messages { list-style: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        #messages li { margin-bottom: 12px; display: flex; align-items: start; gap: 10px; }
        .avatar-chat { width: 35px; height: 35px; border-radius: 50%; background: #40444b; }
        .msg-content { display: flex; flex-direction: column; }
        .pseudo { color: #f2f3f5; font-weight: bold; font-size: 0.95rem; }
        .texte-message { color: #dbdee1; margin-top: 2px; }
        #typing-indicator { padding: 0 20px 5px 20px; font-size: 0.85rem; color: #b5bac1; height: 20px; font-style: italic; }
        #form { display: flex; padding: 20px; background: #2b2d31; gap: 10px; }
        #input { flex-grow: 1; padding: 12px; background: #383a40; border: none; color: #fff; border-radius: 8px; outline: none; }

        /* Volet Profil (À Droite) */
        #profile-panel { width: 280px; background: #111214; display: flex; flex-direction: column; padding: 20px; align-items: center; }
        .profile-card { background: #2b2d31; width: 100%; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #profile-avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #111214; margin-top: -40px; margin-bottom: 10px; background: #40444b; }
        #profile-username { color: #fff; font-weight: bold; margin-bottom: 15px; }
        .profile-section-title { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: #b5bac1; text-align: left; margin-bottom: 5px; }
        #profile-bio-text { color: #dbdee1; font-size: 0.9rem; text-align: left; background: #1e1f22; padding: 8px; border-radius: 4px; margin-bottom: 15px; min-height: 40px; word-break: break-word; }
        
        /* Inputs d'édition du profil */
        .profile-edit-input { width: 100%; padding: 8px; background: #1e1f22; border: none; color: #fff; border-radius: 4px; font-size: 0.85rem; margin-bottom: 10px; outline: none; }
        .save-profile-btn { width: 100%; padding: 8px; background: #248046; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .save-profile-btn:hover { background: #1a6535; }
        .logout-btn { margin-top: auto; width: 100%; padding: 8px; background: #da373c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .logout-btn:hover { background: #a92b2f; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">Ha, te revoilà !</h2>
        <p id="auth-subtitle">Nous sommes ravis de te revoir !</p>
        
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="auth-username">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="auth-password">
        </div>
        
        <button class="auth-btn" id="auth-submit-btn">Se connecter</button>
        
        <div class="switch-auth" id="auth-switch-text">
            Besoin d'un compte ? <a id="link-to-register">S'inscrire</a>
        </div>
    </div>

    <div id="main-app">
        <div class="app-layout">
            <div id="chat-window">
                <div style="background: #313338; padding: 15px; border-bottom: 1px solid #1f2023;">
                    <span style="color: #fff; font-weight: bold;">💬 # général</span>
                </div>
                <ul id="messages"></ul>
                <div id="typing-indicator"></div>
                <form id="form">
                    <input id="input" autocomplete="off" placeholder="Envoyer un message dans #général" />
                </form>
            </div>

            <div id="profile-panel">
                <div style="height: 30px;"></div> <div class="profile-card">
                    <img id="profile-avatar" src="" alt="Avatar">
                    <div id="profile-username">@Pseudo</div>
                    
                    <div class="profile-section-title">À propos de moi</div>
                    <div id="profile-bio-text">Ma biographie...</div>

                    <div class="profile-section-title">Modifier le profil</div>
                    <input type="text" id="edit-avatar-url" class="profile-edit-input" placeholder="Lien d'image de profil (URL)">
                    <input type="text" id="edit-bio" class="profile-edit-input" placeholder="Nouvelle biographie">
                    <button class="save-profile-btn" id="save-profile-btn">Enregistrer</button>
                </div>

                <button class="logout-btn" id="logout-btn">Se déconnecter</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
