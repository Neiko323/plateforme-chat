<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Mini-Discord</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1f22; color: #dbdee1;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }
        
        /* Écran d'accueil */
        .auth-container { background: #313338; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .auth-container h2 { text-align: center; color: #fff; margin-bottom: 8px; }
        .auth-container p { text-align: center; color: #b5bac1; font-size: 0.9rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #b5bac1; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 10px; background: #1e1f22; border: none; color: #fff; border-radius: 3px; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: #5865f2; color: white; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .switch-auth { text-align: center; font-size: 0.85rem; color: #949ba4; }
        .switch-auth a { color: #00a8fc; text-decoration: none; cursor: pointer; }
        
        /* Application Globale */
        #main-app { display: none; width: 100%; max-width: 900px; height: 85vh; background: #2b2d31; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .app-layout { display: flex; height: 100%; }
        
        /* Panneau de Gauche (Salons + Toi) */
        #left-sidebar { width: 240px; background: #2f3136; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #1f2023; }
        .channels-list { padding: 15px; }
        .channel-item { padding: 8px; color: #8e9297; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .channel-item.active { background: #40444b; color: #fff; }
        
        /* Petite barre utilisateur en bas à gauche */
        .user-footer { background: #232428; padding: 10px; display: flex; align-items: center; justify-content: space-between; }
        .user-footer-info { display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .footer-avatar { width: 32px; height: 32px; border-radius: 50%; background: #40444b; object-fit: cover; }
        .footer-username { color: #fff; font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gear-btn { background: none; border: none; color: #b9bbbe; cursor: pointer; font-size: 1.2rem; padding: 4px; border-radius: 4px; }
        .gear-btn:hover { background: #35373c; color: #dcddde; }

        /* Zone de Chat */
        #chat-window { flex-grow: 1; display: flex; flex-direction: column; height: 100%; }
        #messages { list-style: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        #messages li { margin-bottom: 12px; display: flex; align-items: start; gap: 10px; }
        .avatar-chat { width: 35px; height: 35px; border-radius: 50%; background: #40444b; object-fit: cover; }
        .msg-content { display: flex; flex-direction: column; }
        .pseudo { color: #f2f3f5; font-weight: bold; font-size: 0.95rem; }
        .texte-message { color: #dbdee1; margin-top: 2px; word-break: break-all; }
        #typing-indicator { padding: 0 20px 5px 20px; font-size: 0.85rem; color: #b5bac1; height: 20px; font-style: italic; }
        #form { display: flex; padding: 20px; background: #2b2d31; gap: 10px; }
        #input { flex-grow: 1; padding: 12px; background: #383a40; border: none; color: #fff; border-radius: 8px; outline: none; }

        /* 🪟 MODALE PARAMÈTRES STYLE DISCORD AVEC ONGLETS */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: #313338; width: 100%; max-width: 650px; height: 500px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 25px rgba(0,0,0,0.5); display: flex; }
        
        /* Menu latéral gauche de la modale */
        .modal-sidebar { width: 180px; background: #2b2d31; padding: 20px 10px; display: flex; flex-direction: column; gap: 5px; border-right: 1px solid #1f2023; }
        .modal-tab-btn { background: none; border: none; color: #b5bac1; text-align: left; padding: 10px; border-radius: 4px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .modal-tab-btn:hover { background: #35373c; color: #dbdee1; }
        .modal-tab-btn.active { background: #40444b; color: #fff; font-weight: bold; }
        
        /* Zone de contenu à droite de la modale */
        .modal-main { flex-grow: 1; display: flex; flex-direction: column; background: #313338; }
        .modal-header { padding: 20px; color: #fff; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2023; }
        .close-modal-btn { background: none; border: none; color: #b5bac1; font-size: 1.2rem; cursor: pointer; }
        .modal-body { padding: 20px; flex-grow: 1; overflow-y: auto; }
        
        /* Conteneurs des sections cachées/affichées */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .modal-body label { display: block; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: #b5bac1; margin-bottom: 6px; margin-top: 15px; }
        .modal-body label:first-child { margin-top: 0; }
        .modal-body input { width: 100%; padding: 10px; background: #1e1f22; border: none; color: #fff; border-radius: 4px; outline: none; }
        .modal-body input[type="file"] { background: none; padding: 5px 0; }
        
        .modal-footer { padding: 15px 20px; background: #2b2d31; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1f2023; }
        .save-btn { padding: 10px 20px; background: #248046; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .save-btn:hover { background: #1a6535; }
        .logout-modal-btn { padding: 10px 15px; background: #da373c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">Ha, te revoilà !</h2>
        <p id="auth-subtitle">Nous sommes ravis de te revoir !</p>
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="auth-username">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="auth-password">
        </div>
        <button class="auth-btn" id="auth-submit-btn">Se connecter</button>
        <div class="switch-auth" id="auth-switch-text">Besoin d'un compte ? <a id="link-to-register">S'inscrire</a></div>
    </div>

    <div id="main-app">
        <div class="app-layout">
            <div id="left-sidebar">
                <div class="channels-list">
                    <div style="color: #fff; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin-bottom: 10px;">Salons textuels</div>
                    <div class="channel-item active"># général</div>
                </div>
                <div class="user-footer">
                    <div class="user-footer-info">
                        <img id="footer-user-avatar" class="footer-avatar" src="" alt="">
                        <div id="footer-user-username" class="footer-username">@Pseudo</div>
                    </div>
                    <button class="gear-btn" id="open-settings-btn" title="Paramètres utilisateur">⚙️</button>
                </div>
            </div>

            <div id="chat-window">
                <div style="background: #313338; padding: 15px; border-bottom: 1px solid #1f2023;">
                    <span style="color: #fff; font-weight: bold;">💬 # général</span>
                </div>
                <ul id="messages"></ul>
                <div id="typing-indicator"></div>
                <form id="form">
                    <input id="input" autocomplete="off" placeholder="Envoyer un message dans #général" />
                </form>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <div class="modal-sidebar">
                <div style="color: #949ba4; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; padding: 0 10px 10px 10px;">Paramètres</div>
                <button class="modal-tab-btn active" data-target="tab-profile">Mon Profil</button>
                <button class="modal-tab-btn" data-target="tab-account">Mon Compte</button>
                <button class="logout-modal-btn" id="logout-btn" style="margin-top: auto; text-align: center;">Déconnexion</button>
            </div>
            
            <div class="modal-main">
                <div class="modal-header">
                    <span id="modal-tab-title">Profil utilisateur</span>
                    <button class="close-modal-btn" id="close-settings-btn">✕</button>
                </div>
                
                <div class="modal-body">
                    <div id="tab-profile" class="tab-content active">
                        <label>Photo de profil (depuis le PC)</label>
                        <input type="file" id="edit-avatar-file" accept="image/*">

                        <label>Modifier la Biographie</label>
                        <input type="text" id="edit-bio" placeholder="Dis-nous en plus sur toi...">
                    </div>

                    <div id="tab-account" class="tab-content">
                        <label>Changer le Pseudo (Nom d'utilisateur)</label>
                        <input type="text" id="edit-username">

                        <label style="color: #f23f43; margin-top: 25px;">Nouveau mot de passe</label>
                        <input type="password" id="edit-new-password" placeholder="Laisse vide pour ne pas changer">

                        <hr style="border: 0; border-top: 1px solid #3f4147; margin: 25px 0 15px 0;">

                        <label style="color: #00a8fc;">Mot de passe actuel (Requis pour l'onglet Compte)</label>
                        <input type="password" id="edit-current-password" placeholder="Entre ton mot de passe actuel pour valider">
                    </div>
                </div>
                
                <div class="modal-footer">
                    <span style="color: #949ba4; font-size: 0.8rem;">Modifications instantanées</span>
                    <button class="save-btn" id="save-profile-btn">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
