<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CyberChat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #202225; 
            color: #dcddde;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container { 
            width: 100%;
            max-width: 600px; 
            height: 80vh;
            background: #36393f; 
            display: flex;
            flex-direction: column;
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        h2 { background: #2f3136; padding: 15px; text-align: center; font-size: 1.2rem; color: #fff; border-bottom: 1px solid #202225; }
        #messages { list-style-type: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        #messages li { margin-bottom: 15px; line-height: 1.4; }
        .pseudo-msg { color: #7289da; font-weight: bold; margin-right: 8px; }
        .text-msg { color: #dcddde; }
        #typing-indicator { padding: 0 20px 5px 20px; font-size: 0.85rem; color: #b9bbbe; height: 20px; font-style: italic; }
        #form { display: flex; padding: 20px; background: #2f3136; gap: 10px; }
        #input { flex-grow: 1; padding: 12px; border: none; background: #40444b; color: #fff; border-radius: 5px; outline: none; }
        #input::placeholder { color: #72767d; }
        button { padding: 12px 24px; border: none; background: #5865f2; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #4752c4; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h2>💬 # général</h2>
        <ul id="messages"></ul>
        <div id="typing-indicator"></div>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Envoyer un message dans #général" />
            <button>Envoyer</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
