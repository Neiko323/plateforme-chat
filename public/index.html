<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Mini-Discord Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1f22; color: #dbdee1;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }
        
        /* Écran d'accueil */
        .auth-container { background: #313338; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .auth-container h2 { text-align: center; color: #fff; margin-bottom: 8px; }
        .auth-container p { text-align: center; color: #b5bac1; font-size: 0.9rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #b5bac1; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 10px; background: #1e1f22; border: none; color: #fff; border-radius: 3px; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: #5865f2; color: white; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .switch-auth { text-align: center; font-size: 0.85rem; color: #949ba4; }
        .switch-auth a { color: #00a8fc; text-decoration: none; cursor: pointer; }
        
        /* Application Globale */
        #main-app { display: none; width: 100%; max-width: 1000px; height: 85vh; background: #2b2d31; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .app-layout { display: flex; height: 100%; }
        
        /* Panneau de Gauche (Salons + MP + Toi) */
        #left-sidebar { width: 260px; background: #2f3136; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #1f2023; }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .sidebar-section-title { color: #949ba4; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; margin-top: 15px; }
        .sidebar-section-title:first-child { margin-top: 0; }
        
        .item-list { list-style: none; }
        .clickable-item { padding: 8px; color: #949ba4; font-weight: 500; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
        .clickable-item:hover { background: #35373c; color: #dbdee1; }
        .clickable-item.active { background: #40444b; color: #fff !important; font-weight: bold !important; }
        
        /* 🚨 Style pour signifier qu'il y a des messages non lus */
        .clickable-item.unread { color: #ffffff; font-weight: bold; }
        
        .item-content { display: flex; align-items: center; gap: 8px; }
        .sidebar-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        
        /* 🔴 Badge rouge style Discord (image_90d69f.png) */
        .badge-notification {
            background-color: #f23f43;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            display: inline-block;
        }
        
        /* Pied de page utilisateur */
        .user-footer { background: #232428; padding: 10px; display: flex; align-items: center; justify-content: space-between; }
        .user-footer-info { display: flex; align-items: center; gap: 8px; overflow: hidden; cursor: pointer; }
        .footer-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .footer-username { color: #fff; font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gear-btn { background: none; border: none; color: #b9bbbe; cursor: pointer; font-size: 1.2rem; padding: 4px; border-radius: 4px; }
        .gear-btn:hover { background: #35373c; color: #dcddde; }

        /* Zone de Chat */
        #chat-window { flex-grow: 1; display: flex; flex-direction: column; height: 100%; }
        #chat-header { background: #313338; padding: 15px; border-bottom: 1px solid #1f2023; color: #fff; font-weight: bold; }
        #messages { list-style: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        #messages li { margin-bottom: 12px; display: flex; align-items: start; gap: 10px; }
        .avatar-chat { width: 35px; height: 35px; border-radius: 50%; background: #40444b; object-fit: cover; cursor: pointer; }
        .avatar-chat:hover { filter: brightness(0.8); }
        .msg-content { display: flex; flex-direction: column; }
        .pseudo { color: #f2f3f5; font-weight: bold; font-size: 0.95rem; cursor: pointer; }
        .pseudo:hover { text-decoration: underline; }
        .texte-message { color: #dbdee1; margin-top: 2px; word-break: break-all; }
        
        /* ⌨️ Indicateur d'écriture */
        #typing-indicator { padding: 0 20px 5px 20px; font-size: 0.85rem; color: #b5bac1; height: 20px; font-style: italic; font-weight: 500; }
        
        #form { display: flex; padding: 20px; background: #2b2d31; gap: 10px; }
        #input { flex-grow: 1; padding: 12px; background: #383a40; border: none; color: #fff; border-radius: 8px; outline: none; }

        /* MINI PROFIL */
        #mini-profile-card { display: none; position: fixed; background: #18191c; width: 280px; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.6); z-index: 1000; border: 1px solid #2f3136; }
        .profile-banner { height: 60px; background: #5865f2; }
        .profile-avatar-container { padding: 0 16px; margin-top: -30px; display: flex; justify-content: space-between; align-items: end; }
        .profile-card-avatar { width: 70px; height: 70px; border-radius: 50%; border: 6px solid #18191c; background: #2f3136; object-fit: cover; }
        .profile-card-body { padding: 16px; background: #1f2023; margin: 8px; border-radius: 8px; }
        .profile-card-username { color: #fff; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
        .profile-card-bio-title { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #b5bac1; margin-bottom: 4px; }
        .profile-card-bio { font-size: 0.85rem; color: #dbdee1; margin-bottom: 15px; white-space: pre-line; }
        .profile-action-btn { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; margin-bottom: 6px; }
        .btn-primary { background: #5865f2; color: #fff; }
        .btn-primary:hover { background: #4752c4; }
        .btn-secondary { background: #4f545c; color: #fff; }
        .btn-secondary:hover { background: #686d73; }

        /* MODALE PARAMÈTRES */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: #313338; width: 100%; max-width: 650px; height: 500px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 25px rgba(0,0,0,0.5); display: flex; }
        .modal-sidebar { width: 180px; background: #2b2d31; padding: 20px 10px; display: flex; flex-direction: column; gap: 5px; border-right: 1px solid #1f2023; }
        .modal-tab-btn { background: none; border: none; color: #b5bac1; text-align: left; padding: 10px; border-radius: 4px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .modal-tab-btn:hover { background: #35373c; color: #dbdee1; }
        .modal-tab-btn.active { background: #40444b; color: #fff; font-weight: bold; }
        .modal-main { flex-grow: 1; display: flex; flex-direction: column; background: #313338; }
        .modal-header { padding: 20px; color: #fff; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2023; }
        .close-modal-btn { background: none; border: none; color: #b5bac1; font-size: 1.2rem; cursor: pointer; }
        .modal-body { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal-body label { display: block; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: #b5bac1; margin-bottom: 6px; margin-top: 15px; }
        .modal-body label:first-child { margin-top: 0; }
        .modal-body input { width: 100%; padding: 10px; background: #1e1f22; border: none; color: #fff; border-radius: 4px; outline: none; }
        .modal-footer { padding: 15px 20px; background: #2b2d31; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1f2023; }
        .save-btn { padding: 10px 20px; background: #248046; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .logout-modal-btn { padding: 10px 15px; background: #da373c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- AUTHENTIFICATION -->
    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">Ha, te revoilà !</h2>
        <p id="auth-subtitle">Nous sommes ravis de te revoir !</p>
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="auth-username">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="auth-password">
        </div>
        <button class="auth-btn" id="auth-submit-btn">Se connecter</button>
        <div class="switch-auth" id="auth-switch-text">Besoin d'un compte ? <a id="link-to-register">S'inscrire</a></div>
    </div>

    <!-- APPLICATION MINI DISCORD -->
    <div id="main-app">
        <div class="app-layout">
            <div id="left-sidebar">
                <div class="sidebar-scroll">
                    <!-- SECTION SALONS -->
                    <div class="sidebar-section-title">Salons textuels</div>
                    <ul class="item-list">
                        <li class="clickable-item active" id="global-channel-btn">
                            <div class="item-content">
                                <span>💬 # général</span>
                            </div>
                            <div id="global-badge-container"></div>
                        </li>
                    </ul>

                    <!-- SECTION MESSAGES PRIVÉS & AMIS -->
                    <div class="sidebar-section-title">Messages privés</div>
                    <ul class="item-list" id="dms-list"></ul>
                </div>
                <div class="user-footer">
                    <div class="user-footer-info" id="footer-profile-click">
                        <img id="footer-user-avatar" class="footer-avatar" src="" alt="">
                        <div id="footer-user-username" class="footer-username">@Pseudo</div>
                    </div>
                    <button class="gear-btn" id="open-settings-btn">⚙️</button>
                </div>
            </div>

            <!-- Zone de chat principale -->
            <div id="chat-window">
                <div id="chat-header">💬 # général</div>
                <ul id="messages"></ul>
                <div id="typing-indicator"></div>
                <form id="form">
                    <input id="input" autocomplete="off" placeholder="Envoyer un message..." />
                </form>
            </div>
        </div>
    </div>

    <!-- MINI PROFIL POP-UP -->
    <div id="mini-profile-card">
        <div class="profile-banner"></div>
        <div class="profile-avatar-container">
            <img class="profile-card-avatar" id="mp-card-avatar" src="" alt="">
        </div>
        <div class="profile-card-body">
            <div class="profile-card-username" id="mp-card-username">User</div>
            <div class="profile-card-bio-title">À propos de moi</div>
            <div class="profile-card-bio" id="mp-card-bio">Pas de biographie.</div>
            <div id="mp-card-actions"></div>
        </div>
    </div>

    <!-- MODALE PARAMÈTRES -->
    <div id="settings-modal">
        <div class="modal-content">
            <div class="modal-sidebar">
                <button class="modal-tab-btn active" data-target="tab-profile">Mon Profil</button>
                <button class="modal-tab-btn" data-target="tab-account">Mon Compte</button>
                <button class="logout-modal-btn" id="logout-btn" style="margin-top: auto;">Déconnexion</button>
            </div>
            <div class="modal-main">
                <div class="modal-header">
                    <span id="modal-tab-title">Profil utilisateur</span>
                    <button class="close-modal-btn" id="close-settings-btn">✕</button>
                </div>
                <div class="modal-body">
                    <div id="tab-profile" class="tab-content active">
                        <label>Photo de profil</label>
                        <input type="file" id="edit-avatar-file" accept="image/*">
                        <label>Biographie</label>
                        <input type="text" id="edit-bio">
                    </div>
                    <div id="tab-account" class="tab-content">
                        <label>Pseudo</label>
                        <input type="text" id="edit-username">
                        <label style="color: #f23f43; margin-top: 15px;">Nouveau mot de passe</label>
                        <input type="password" id="edit-new-password">
                        <label style="color: #00a8fc; margin-top: 15px;">Mot de passe actuel</label>
                        <input type="password" id="edit-current-password">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="save-btn" id="save-profile-btn">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
